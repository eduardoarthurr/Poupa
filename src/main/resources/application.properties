# nome da Aplicacao
spring.application.name=poupa-api

# configuracao da conexao JDBC
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${POUPA_DB_URL}
spring.datasource.username=${POUPA_DB_USERNAME}
spring.datasource.password=${POUPA_DB_PASSWORD}

# configuracao do hibernate JPA
spring.jpa.hibernate.ddl-auto=validate

# mostra no console o SQL que o Java gera
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# dialeto do PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.baseline-on-migrate=true

# ativar threads virtuais (Java 21) - performance para o Bot
spring.threads.virtual.enabled=true
